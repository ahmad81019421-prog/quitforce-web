<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuitForce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Pre-paint language/direction sync: avoids the LTR→RTL flash that
         would otherwise happen between this HTML loading and i18n.js
         running inside React. Reads the same localStorage key that
         i18next-browser-languagedetector uses. -->
    <script>
      try {
        var lng = localStorage.getItem('i18nextLng') || 'ar'
        if (lng.indexOf('en') === 0) {
          document.documentElement.lang = 'en'
          document.documentElement.dir = 'ltr'
        } else {
          document.documentElement.lang = 'ar'
          document.documentElement.dir = 'rtl'
        }
      } catch (_) { /* localStorage may be unavailable in private mode */ }
    </script>
  </head>
  <body class="bg-black text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
